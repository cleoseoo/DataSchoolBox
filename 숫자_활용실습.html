
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비트 베이커리 - 짝꿍 파티쉐 모드</title>
    <style>
        /* 트렌디한 베이커리 컬러 팔레트 */
        :root {
            --bg-butter: #fffdf7;
            --bg-dot: #f4ebd8;
            --header-orange: #ff9f43;
            --header-orange-dark: #ee5253;
            --wood-brown: #5c3a21;
            --dough-color: #fdf5e6;
            --baked-color: #e17055;
            --p1-color: #ff7675; /* 1P: 딸기 마카롱 느낌 */
            --p2-color: #74b9ff; /* 2P: 소다 마카롱 느낌 */
            --apple-red: #ff3b30;
            --apple-green: #34c759;
        }

        * { cursor: default !important; box-sizing: border-box; }

        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* 은은한 도트 패턴 배경 */
            background-color: var(--bg-butter);
            background-image: radial-gradient(var(--bg-dot) 2px, transparent 2px);
            background-size: 30px 30px;
            display: flex; flex-direction: column; overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        /* [상단 헤더] 따뜻한 오븐 느낌 */
        header {
            background: linear-gradient(135deg, var(--header-orange) 0%, var(--header-orange-dark) 100%);
            padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            color: white; z-index: 1000;
            box-shadow: 0 4px 15px rgba(238, 82, 83, 0.2);
        }

        .header-title { font-size: 1.3rem; font-weight: 900; letter-spacing: -0.5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        .status-controller { display: flex; gap: 10px; }
        .status-btn {
            padding: 8px 18px; border-radius: 20px; border: none;
            font-weight: 800; font-size: 0.95rem; background: rgba(255,255,255,0.9);
            color: #333; cursor: pointer !important; transition: 0.2s;
            display: flex; align-items: center; gap: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .status-btn:hover { transform: translateY(-2px); background: #fff; }
        .btn-sos { color: var(--apple-red); }
        .btn-done { color: var(--apple-green); }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }

        /* [메인 게임 카드] 나무 도마 느낌의 깔끔한 보드 */
        .bakery-card {
            background: #ffffff;
            width: 100%; max-width: 950px; min-height: 75vh;
            border-radius: 30px;
            border: 6px solid var(--wood-brown);
            box-shadow: 0 20px 50px rgba(92, 58, 33, 0.15), inset 0 0 0 4px #fffdf7;
            padding: 30px 40px; display: flex; flex-direction: column; align-items: center;
            position: relative; z-index: 10;
        }

        .game-info { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .best-score { font-size: 1.05rem; font-weight: 800; color: #a4b0be; background: #f1f2f6; padding: 8px 15px; border-radius: 12px; }
        .timer-box { font-size: 1.8rem; font-weight: 900; color: var(--header-orange-dark); text-shadow: 1px 1px 0px #ffeaa7; }
        .score-box { font-weight: 900; color: var(--wood-brown); font-size: 1.3rem; background: #ffeaa7; padding: 8px 20px; border-radius: 15px; border: 2px dashed #fdcb6e; }

        /* 주문판 */
        .order-display {
            background: #fff; border: 4px dashed var(--header-orange);
            padding: 15px 80px; border-radius: 25px; margin-bottom: 25px;
            text-align: center; width: 100%; max-width: 450px;
            box-shadow: 0 10px 20px rgba(255, 159, 67, 0.1);
        }
        .order-label { font-size: 1rem; font-weight: 900; color: var(--header-orange-dark); margin-bottom: 0px; }
        .target-num { font-size: 5.5rem; font-weight: 900; margin: 0; color: var(--wood-brown); line-height: 1.1; }

        /* 2인용 분할 영역 */
        .coop-area { display: flex; width: 100%; justify-content: center; gap: 20px; margin-bottom: 20px; }
        
        .player-zone {
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 25px; border-radius: 25px;
            background: #fdfdfd; box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .player-zone.p1 { border: 3px solid rgba(255, 118, 117, 0.4); }
        .player-zone.p2 { border: 3px solid rgba(116, 185, 255, 0.4); }

        .player-title { font-weight: 900; margin-bottom: 15px; font-size: 1.1rem; padding: 5px 15px; border-radius: 12px; }
        .p1-title { background: rgba(255, 118, 117, 0.1); color: var(--p1-color); }
        .p2-title { background: rgba(116, 185, 255, 0.1); color: var(--p2-color); }

        .bit-area { display: flex; gap: 12px; }
        .bit-box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        
        /* 비트 버튼: 반죽 -> 빵 트랜지션 */
        .bit-btn {
            width: 65px; height: 85px; border-radius: 18px;
            background: var(--dough-color); border: 2px solid #eccc68;
            font-size: 2rem; font-weight: 900; color: #ced6e0;
            cursor: pointer !important; transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 0 #dfe4ea, 0 10px 10px rgba(0,0,0,0.05);
        }
        
        /* 1P 활성화 스타일 (딸기 쿠키) */
        .bit-btn.active.p1-btn {
            background: var(--p1-color); color: white; border-color: #d63031;
            transform: translateY(6px); box-shadow: 0 0 0 #d63031;
        }
        /* 2P 활성화 스타일 (소다 쿠키) */
        .bit-btn.active.p2-btn {
            background: var(--p2-color); color: white; border-color: #0984e3;
            transform: translateY(6px); box-shadow: 0 0 0 #0984e3;
        }

        .weight { font-size: 1.1rem; font-weight: 900; color: #2f3542; }
        .key-hint { font-size: 0.8rem; font-weight: 800; color: #a4b0be; background: #f1f2f6; padding: 4px 10px; border-radius: 8px; margin-top: 2px; }

        /* 현재 합계 */
        .sum-box {
            font-size: 1.6rem; font-weight: 900; color: var(--wood-brown);
            background: #f1f2f6; padding: 12px 40px; border-radius: 20px;
            border: 2px solid #dfe4ea;
        }

        /* 빵 튀어오르는 애니메이션 관련 CSS */
        .floating-bread {
            position: absolute;
            font-size: 3rem;
            pointer-events: none; /* 클릭 방해 안 함 */
            z-index: 5000;
            animation: popUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
            50% { transform: translateY(-150px) scale(1.5) rotate(15deg); opacity: 1; }
            100% { transform: translateY(-100px) scale(1) rotate(30deg); opacity: 0; }
        }

        /* 오버레이 디자인 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 253, 247, 0.95);
            backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; border-radius: 24px; text-align: center;
        }
        .start-btn {
            padding: 16px 45px; font-size: 1.5rem; font-weight: 900;
            background: linear-gradient(135deg, var(--header-orange), var(--header-orange-dark));
            color: white; border: none; box-shadow: 0 8px 20px rgba(238, 82, 83, 0.3);
            border-radius: 20px; cursor: pointer !important; margin-top: 25px;
            transition: 0.2s;
        }
        .start-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 25px rgba(238, 82, 83, 0.4); }

        .success-flash { animation: successCard 0.4s ease; }
        @keyframes successCard { 0% { transform: scale(1); } 50% { transform: scale(1.02); border-color: var(--header-orange); } 100% { transform: scale(1); } }
    </style>
</head>
<body id="gameBody">

    <header>
        <div class="header-title">👨‍🍳 비트 베이커리 - 숫자의 디지털 표현</div>
        <div class="status-controller">
            <button class="status-btn" onclick="location.reload()">🔄 초기화</button>
            <button class="status-btn btn-sos" onclick="setStatus('sos')">🙋‍♂️ SOS 요청</button>
            <button class="status-btn btn-done" onclick="setStatus('done')">✅ 미션 완료</button>
        </div>
    </header>

    <main>
        <div class="bakery-card" id="gameCard">
            
            <div id="overlay">
                <div style="font-size: 4.5rem; margin-bottom: 10px;">🥐🥨🥞</div>
                <h1 style="font-size: 2.8rem; color: var(--wood-brown); margin: 0 0 10px 0;">짝꿍 파티쉐 모드</h1>
                <p style="font-weight: 700; color: #a4b0be; margin-bottom: 25px; font-size: 1.1rem;">친구와 키보드를 반으로 나누어 힘을 합치세요!</p>
                <div style="display:flex; gap: 15px; margin-bottom: 10px;">
                    <div style="background: rgba(255, 118, 117, 0.1); padding: 15px 25px; border-radius: 18px; border: 2px solid var(--p1-color);">
                        <b style="color: var(--p1-color); font-size: 1.1rem;">🍓 1P (왼쪽)</b><br><span style="color:#2d3436; font-weight:700;">A, S, D, F</span>
                    </div>
                    <div style="background: rgba(116, 185, 255, 0.1); padding: 15px 25px; border-radius: 18px; border: 2px solid var(--p2-color);">
                        <b style="color: var(--p2-color); font-size: 1.1rem;">🫐 2P (오른쪽)</b><br><span style="color:#2d3436; font-weight:700;">H, J, K, L</span>
                    </div>
                </div>
                <button class="start-btn" onclick="startGame()">영업 시작!</button>
            </div>

            <div class="game-info">
                <div class="best-score">🏆 최고 기록: <span id="highScore">0</span>개</div>
                <div class="timer-box">⏱️ <span id="timerText">60</span>s</div>
                <div class="score-box">SCORE: <span id="currentScore" style="color: var(--header-orange-dark); font-size: 1.5rem;">0</span></div>
            </div>

            <div class="order-display" id="orderBox">
                <div class="order-label">👨‍🍳 손님이 주문한 숫자!</div>
                <h2 class="target-num" id="targetText">?</h2>
            </div>

            <div class="coop-area">
                <div class="player-zone p1">
                    <div class="player-title p1-title">🍓 1P (왼쪽 오븐)</div>
                    <div class="bit-area">
                        <div class="bit-box"><div class="bit-btn p1-btn" id="btn-128" onclick="toggleBit(this, 128)">0</div><div class="weight">128</div><div class="key-hint">A</div></div>
                        <div class="bit-box"><div class="bit-btn p1-btn" id="btn-64" onclick="toggleBit(this, 64)">0</div><div class="weight">64</div><div class="key-hint">S</div></div>
                        <div class="bit-box"><div class="bit-btn p1-btn" id="btn-32" onclick="toggleBit(this, 32)">0</div><div class="weight">32</div><div class="key-hint">D</div></div>
                        <div class="bit-box"><div class="bit-btn p1-btn" id="btn-16" onclick="toggleBit(this, 16)">0</div><div class="weight">16</div><div class="key-hint">F</div></div>
                    </div>
                </div>

                <div class="player-zone p2">
                    <div class="player-title p2-title">🫐 2P (오른쪽 오븐)</div>
                    <div class="bit-area">
                        <div class="bit-box"><div class="bit-btn p2-btn" id="btn-8" onclick="toggleBit(this, 8)">0</div><div class="weight">8</div><div class="key-hint">H</div></div>
                        <div class="bit-box"><div class="bit-btn p2-btn" id="btn-4" onclick="toggleBit(this, 4)">0</div><div class="weight">4</div><div class="key-hint">J</div></div>
                        <div class="bit-box"><div class="bit-btn p2-btn" id="btn-2" onclick="toggleBit(this, 2)">0</div><div class="weight">2</div><div class="key-hint">K</div></div>
                        <div class="bit-box"><div class="bit-btn p2-btn" id="btn-1" onclick="toggleBit(this, 1)">0</div><div class="weight">1</div><div class="key-hint">L</div></div>
                    </div>
                </div>
            </div>

            <div class="sum-box">현재 오븐 온도: <span id="sumText" style="color:var(--header-orange-dark);">0</span> ℃</div>
        </div>
    </main>

    <script>
        let score = 0;
        let timeLeft = 60;
        let target = 0;
        let currentSum = 0;
        let isPlaying = false;
        let timerId = null;

        let highScore = localStorage.getItem('bitBakeryCoopScoreV2') || 0;
        document.getElementById('highScore').innerText = highScore;

        function startGame() {
            isPlaying = true;
            score = 0;
            timeLeft = 60;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('currentScore').innerText = score;
            nextRound();

            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timerText').innerText = timeLeft;
                if(timeLeft <= 0) endGame();
            }, 1000);
        }

        document.addEventListener('keydown', (e) => {
            if(!isPlaying) return;
            const key = e.key.toUpperCase();
            
            // 1P
            if(key === 'A') toggleBit(document.getElementById('btn-128'), 128);
            if(key === 'S') toggleBit(document.getElementById('btn-64'), 64);
            if(key === 'D') toggleBit(document.getElementById('btn-32'), 32);
            if(key === 'F') toggleBit(document.getElementById('btn-16'), 16);
            
            // 2P
            if(key === 'H') toggleBit(document.getElementById('btn-8'), 8);
            if(key === 'J') toggleBit(document.getElementById('btn-4'), 4);
            if(key === 'K') toggleBit(document.getElementById('btn-2'), 2);
            if(key === 'L') toggleBit(document.getElementById('btn-1'), 1);
        });

        function toggleBit(btn, val) {
            if(!isPlaying) return;
            if(btn.classList.contains('active')) {
                btn.classList.remove('active');
                btn.innerText = "0";
                currentSum -= val;
            } else {
                btn.classList.add('active');
                btn.innerText = "1";
                currentSum += val;
            }
            document.getElementById('sumText').innerText = currentSum;
            if(currentSum === target) success();
        }

        // 🌟 빵 터지는 시각 효과 함수
        function popBread() {
            const breads = ['🍞', '🥐', '🥖', '🥨', '🥞', '🧇', '🥯', '🍪'];
            // 3~5개의 빵을 동시에 생성
            const popCount = Math.floor(Math.random() * 3) + 3; 
            
            for(let i=0; i<popCount; i++) {
                const bread = breads[Math.floor(Math.random() * breads.length)];
                const el = document.createElement('div');
                el.innerText = bread;
                el.className = 'floating-bread';
                
                // 카드 중앙 부근에서 랜덤하게 퍼지도록 위치 설정
                const card = document.getElementById('gameCard');
                const rect = card.getBoundingClientRect();
                const startX = rect.left + (rect.width / 2) + (Math.random() * 100 - 50);
                const startY = rect.top + (rect.height / 2);

                el.style.left = `${startX}px`;
                el.style.top = `${startY}px`;
                
                document.body.appendChild(el);
                
                // 애니메이션(1초) 종료 후 DOM에서 제거
                setTimeout(() => el.remove(), 1000);
            }
        }

        function success() {
            score++;
            document.getElementById('currentScore').innerText = score;
            document.getElementById('gameCard').classList.add('success-flash');
            
            // 시각 효과 호출
            popBread();

            setTimeout(() => {
                document.getElementById('gameCard').classList.remove('success-flash');
                nextRound();
            }, 400);
        }

        function nextRound() {
            // 난이도 조절: 1~128 사이의 숫자가 자주 나오도록, 가끔 큰 숫자가 나오도록 설정
            if (Math.random() > 0.3) {
                target = Math.floor(Math.random() * 128) + 1; // 1~128
            } else {
                target = Math.floor(Math.random() * 255) + 1; // 1~255
            }
            
            document.getElementById('targetText').innerText = target;
            currentSum = 0;
            document.getElementById('sumText').innerText = "0";
            document.querySelectorAll('.bit-btn').forEach(b => {
                b.classList.remove('active');
                b.innerText = "0";
            });
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerId);
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('bitBakeryCoopScoreV2', highScore);
                document.getElementById('highScore').innerText = highScore;
            }
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay').innerHTML = `
                <div style="font-size: 4rem; margin-bottom: 10px;">🎉</div>
                <h1 style="color:var(--header-orange-dark); margin: 0 0 10px 0;">영업 종료!</h1>
                <p style="font-weight:700; font-size:1.3rem; color: #2d3436; margin-bottom: 25px;">환상의 호흡으로 <b style="color:var(--apple-green); font-size:2.2rem;">${score}</b>개의 빵을 구웠어요!</p>
                <button class="start-btn" onclick="location.reload()">다시 도전하기</button>
            `;
        }

        function setStatus(status) {
            const body = document.getElementById('gameBody');
            body.style.boxShadow = 'none';
            if(status === 'sos') body.style.boxShadow = 'inset 0 0 0 20px var(--apple-red)';
            if(status === 'done') body.style.boxShadow = 'inset 0 0 0 20px var(--apple-green)';
        }
    </script>
</body>
</html>
