<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비트 베이커리 - 짝꿍 파티쉐 모드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* ✨ 숫자의 디지털 표현 전용 컬러 팔레트 (오션 블루 & 스카이 블루) */
        :root {
            --bg-pastel: #f0f9ff; /* 청량한 하늘색 그라데이션 배경 */
            --blue-main: #0284c7; /* 오션 블루 (메인) */
            --blue-light: #38bdf8; /* 스카이 블루 */
            --gold-main: #d97706; /* 고급스러운 골드 (텍스트 강조) */
            --gold-light: #fbbf24;
            
            /* 플레이어 컬러 (푸른 계열 내에서 대비) */
            --p1-color: #0ea5e9; /* 1P: 맑은 파란색 */
            --p1-shadow: #38bdf8;
            --p2-color: #6366f1; /* 2P: 인디고 블루 */
            --p2-shadow: #818cf8;
            
            --text-main: #0f172a;
            --text-sub: #475569;
            --apple-red: #ef4444;
            --apple-green: #10b981;
            
            --card-white: #ffffff;
        }

        * { cursor: default !important; box-sizing: border-box; }

        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Pretendard', 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            display: flex; flex-direction: column; overflow: hidden;
            transition: box-shadow 0.3s ease;
            position: relative;
        }
        
        /* 은은한 도트 패턴을 배경에 깔아 깊이감 추가 */
        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(2, 132, 199, 0.05) 2px, transparent 2px);
            background-size: 30px 30px; z-index: 0;
        }

        /* [상단 헤더] 깔끔한 글래스 느낌 */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 35px; display: flex; justify-content: flex-start; align-items: center;
            border-bottom: 1px solid rgba(2, 132, 199, 0.1);
            z-index: 1000; position: relative;
        }

        .header-title { font-size: 1.3rem; font-weight: 900; letter-spacing: -0.5px; color: var(--blue-main); display: flex; align-items: center; gap: 8px;}

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 10; }

        /* [메인 게임 카드] 고급스러운 테이블 느낌 */
        .bakery-card {
            background: var(--card-white);
            width: 100%; max-width: 980px; min-height: 75vh;
            border-radius: 32px;
            border: 1px solid rgba(2, 132, 199, 0.1);
            box-shadow: 0 25px 50px rgba(2, 132, 199, 0.08);
            padding: 40px 50px; display: flex; flex-direction: column; align-items: center;
            position: relative; z-index: 10;
        }

        /* 상단 대시보드 */
        .game-info { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .badge { 
            font-weight: 800; font-size: 1.05rem; padding: 10px 20px; border-radius: 16px; 
            display: flex; align-items: center; gap: 6px;
        }
        .best-score { background: #f8fafc; color: var(--text-sub); border: 1px solid #e2e8f0; }
        
        .timer-box { font-size: 2rem; font-weight: 900; color: var(--blue-main); font-family: 'JetBrains Mono', monospace; letter-spacing: -1px; }
        .timer-box span { display: inline-block; min-width: 50px; text-align: center; }
        
        .score-box { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); color: var(--gold-main); border: 2px solid var(--gold-light); font-size: 1.2rem;}

        /* 주문판 */
        .order-display {
            background: #f0f9ff; border: 2px solid rgba(56, 189, 248, 0.3);
            padding: 20px 80px; border-radius: 24px; margin-bottom: 35px;
            text-align: center; width: 100%; max-width: 500px;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.1);
        }
        .order-label { font-size: 1.05rem; font-weight: 900; color: var(--blue-main); margin-bottom: 5px; }
        .target-num { font-size: 6rem; font-weight: 900; margin: 0; color: var(--text-main); line-height: 1.1; font-family: 'JetBrains Mono', monospace; }

        /* 2인용 분할 영역 */
        .coop-area { display: flex; width: 100%; justify-content: center; gap: 30px; margin-bottom: 30px; }
        
        .player-zone {
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 35px; border-radius: 28px;
            background: #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 2px solid transparent; transition: 0.3s;
        }
        .player-zone.p1 { border-color: rgba(14, 165, 233, 0.15); background: linear-gradient(to bottom, #ffffff, #f0f9ff); }
        .player-zone.p2 { border-color: rgba(99, 102, 241, 0.15); background: linear-gradient(to bottom, #ffffff, #eef2ff); }

        .player-title { font-weight: 900; margin-bottom: 20px; font-size: 1.15rem; padding: 8px 20px; border-radius: 14px; }
        .p1-title { background: rgba(14, 165, 233, 0.1); color: var(--p1-color); }
        .p2-title { background: rgba(99, 102, 241, 0.1); color: var(--p2-color); }

        .bit-area { display: flex; gap: 15px; }
        .bit-box { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        
        /* ✨ 비트 버튼: 프리미엄 키보드 스위치 느낌의 디자인 */
        .bit-btn {
            width: 70px; height: 85px; border-radius: 16px;
            background: #ffffff; border: 2px solid #e2e8f0;
            font-size: 2.2rem; font-weight: 900; color: #cbd5e1; font-family: 'JetBrains Mono';
            cursor: pointer !important; transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 0 #cbd5e1, 0 15px 15px rgba(0,0,0,0.05);
        }
        
        /* 1P 활성화 스타일 */
        .bit-btn.active.p1-btn {
            background: var(--p1-color); color: white; border-color: var(--p1-color);
            transform: translateY(8px); box-shadow: 0 0 0 var(--p1-shadow);
        }
        /* 2P 활성화 스타일 */
        .bit-btn.active.p2-btn {
            background: var(--p2-color); color: white; border-color: var(--p2-color);
            transform: translateY(8px); box-shadow: 0 0 0 var(--p2-shadow);
        }

        .weight { font-size: 1.1rem; font-weight: 900; color: var(--text-sub); }
        .key-hint { font-size: 0.85rem; font-weight: 800; color: #94a3b8; background: #f1f5f9; padding: 4px 12px; border-radius: 8px; margin-top: 2px; border: 1px solid #e2e8f0;}

        /* 현재 합계 */
        .sum-box {
            font-size: 1.4rem; font-weight: 800; color: var(--text-main);
            background: #f8fafc; padding: 15px 40px; border-radius: 20px;
            border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px;
        }
        .sum-val { font-size: 2.2rem; font-weight: 900; color: var(--blue-main); font-family: 'JetBrains Mono';}

        /* 빵 튀어오르는 애니메이션 */
        .floating-bread {
            position: absolute;
            font-size: 3.5rem;
            pointer-events: none; 
            z-index: 5000;
            animation: popUp 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }
        @keyframes popUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
            50% { transform: translateY(-180px) scale(1.3) rotate(15deg); opacity: 1; }
            100% { transform: translateY(-120px) scale(1) rotate(30deg); opacity: 0; }
        }

        /* 세련된 글래스모피즘 오버레이 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; border-radius: 32px; text-align: center;
        }
        .start-btn {
            padding: 18px 50px; font-size: 1.5rem; font-weight: 900;
            background: linear-gradient(135deg, var(--blue-main), var(--blue-light));
            color: white; border: none; box-shadow: 0 10px 25px rgba(2, 132, 199, 0.3);
            border-radius: 20px; cursor: pointer !important; margin-top: 30px;
            transition: 0.3s;
        }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(2, 132, 199, 0.4); }

        .success-flash { animation: successCard 0.4s ease; }
        @keyframes successCard { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.02); border-color: var(--blue-light); box-shadow: 0 0 50px rgba(56, 189, 248, 0.2);} 
            100% { transform: scale(1); } 
        }
    </style>
</head>
<body id="gameBody">

    <header>
        <div class="header-title">👨‍🍳 비트 베이커리 <span style="font-size:0.9rem; font-weight:700; color:#94a3b8; margin-left:10px;">숫자의 디지털 표현</span></div>
    </header>

    <main>
        <div class="bakery-card" id="gameCard">
            
            <div id="overlay">
                <div style="font-size: 5rem; margin-bottom: 10px;">🍰🧁</div>
                <h1 style="font-size: 3rem; color: var(--blue-main); margin: 0 0 15px 0; font-weight: 900;">짝꿍 파티쉐 모드</h1>
                <p style="font-weight: 700; color: var(--text-sub); margin-bottom: 30px; font-size: 1.15rem;">친구와 키보드를 반으로 나누어 디지털 빵을 구워보세요!</p>
                <div style="display:flex; gap: 20px; margin-bottom: 15px;">
                    <div style="background: rgba(14, 165, 233, 0.05); padding: 20px 30px; border-radius: 20px; border: 2px solid rgba(14, 165, 233, 0.2);">
                        <b style="color: var(--p1-color); font-size: 1.2rem;">💧 1P (왼쪽)</b><br><span style="color:var(--text-main); font-weight:800; font-size: 1.1rem; line-height: 2;">A, S, D, F</span>
                    </div>
                    <div style="background: rgba(99, 102, 241, 0.05); padding: 20px 30px; border-radius: 20px; border: 2px solid rgba(99, 102, 241, 0.2);">
                        <b style="color: var(--p2-color); font-size: 1.2rem;">🫐 2P (오른쪽)</b><br><span style="color:var(--text-main); font-weight:800; font-size: 1.1rem; line-height: 2;">H, J, K, L</span>
                    </div>
                </div>
                <button class="start-btn" onclick="startGame()">오븐 가동 시작!</button>
            </div>

            <div class="game-info">
                <div class="badge best-score">🏆 최고 기록: <span id="highScore" style="color:var(--text-main); font-family:'JetBrains Mono'; font-size:1.1rem;">0</span>개</div>
                <div class="timer-box">⏱️ <span id="timerText">60</span>s</div>
                <div class="badge score-box">SCORE <span id="currentScore" style="color: var(--gold-main); font-size: 1.6rem; font-family:'JetBrains Mono';">0</span></div>
            </div>

            <div class="order-display" id="orderBox">
                <div class="order-label">👨‍🍳 손님이 주문한 십진수!</div>
                <h2 class="target-num" id="targetText">?</h2>
            </div>

            <div class="coop-area">
                <div class="player-zone p1">
                    <div class="player-title p1-title">💧 1P 파티쉐 (상위 4비트)</div>
                    <div class="bit-area">
                        <div class="bit-box"><div class="bit-btn p1-btn" id="btn-128" onclick="toggleBit(this, 128)">0</div><div class="weight">128</div><div class="key-hint">A</div></div>
                        <div class="bit-box"><div class="bit-btn p1-btn" id="btn-64" onclick="toggleBit(this, 64)">0</div><div class="weight">64</div><div class="key-hint">S</div></div>
                        <div class="bit-box"><div class="bit-btn p1-btn" id="btn-32" onclick="toggleBit(this, 32)">0</div><div class="weight">32</div><div class="key-hint">D</div></div>
                        <div class="bit-box"><div class="bit-btn p1-btn" id="btn-16" onclick="toggleBit(this, 16)">0</div><div class="weight">16</div><div class="key-hint">F</div></div>
                    </div>
                </div>

                <div class="player-zone p2">
                    <div class="player-title p2-title">🫐 2P 파티쉐 (하위 4비트)</div>
                    <div class="bit-area">
                        <div class="bit-box"><div class="bit-btn p2-btn" id="btn-8" onclick="toggleBit(this, 8)">0</div><div class="weight">8</div><div class="key-hint">H</div></div>
                        <div class="bit-box"><div class="bit-btn p2-btn" id="btn-4" onclick="toggleBit(this, 4)">0</div><div class="weight">4</div><div class="key-hint">J</div></div>
                        <div class="bit-box"><div class="bit-btn p2-btn" id="btn-2" onclick="toggleBit(this, 2)">0</div><div class="weight">2</div><div class="key-hint">K</div></div>
                        <div class="bit-box"><div class="bit-btn p2-btn" id="btn-1" onclick="toggleBit(this, 1)">0</div><div class="weight">1</div><div class="key-hint">L</div></div>
                    </div>
                </div>
            </div>

            <div class="sum-box">현재 오븐의 합계 <span class="sum-val" id="sumText">0</span></div>
        </div>
    </main>

    <script>
        let score = 0;
        let timeLeft = 60;
        let target = 0;
        let currentSum = 0;
        let isPlaying = false;
        let timerId = null;

        let highScore = localStorage.getItem('bitBakeryCoopScoreBlue') || 0;
        document.getElementById('highScore').innerText = highScore;

        // 게임 종료 후 '다시 도전하기' 버튼을 눌렀을 때, 처음 오버레이(오븐 가동 시작) 화면으로 돌아가는 함수
        function resetToStart() {
            // 변수 및 UI 초기화
            isPlaying = false;
            clearInterval(timerId);
            score = 0;
            timeLeft = 60;
            currentSum = 0;
            target = 0;
            
            document.getElementById('currentScore').innerText = score;
            document.getElementById('timerText').innerText = timeLeft;
            document.getElementById('sumText').innerText = "0";
            document.getElementById('targetText').innerText = "?";
            
            document.querySelectorAll('.bit-btn').forEach(b => {
                b.classList.remove('active');
                b.innerText = "0";
            });

            // 오버레이 내용을 초기 설명 화면으로 되돌림
            const overlay = document.getElementById('overlay');
            overlay.innerHTML = `
                <div style="font-size: 5rem; margin-bottom: 10px;">🍰🧁</div>
                <h1 style="font-size: 3rem; color: var(--blue-main); margin: 0 0 15px 0; font-weight: 900;">짝꿍 파티쉐 모드</h1>
                <p style="font-weight: 700; color: var(--text-sub); margin-bottom: 30px; font-size: 1.15rem;">친구와 키보드를 반으로 나누어 디지털 빵을 구워보세요!</p>
                <div style="display:flex; gap: 20px; margin-bottom: 15px;">
                    <div style="background: rgba(14, 165, 233, 0.05); padding: 20px 30px; border-radius: 20px; border: 2px solid rgba(14, 165, 233, 0.2);">
                        <b style="color: var(--p1-color); font-size: 1.2rem;">💧 1P (왼쪽)</b><br><span style="color:var(--text-main); font-weight:800; font-size: 1.1rem; line-height: 2;">A, S, D, F</span>
                    </div>
                    <div style="background: rgba(99, 102, 241, 0.05); padding: 20px 30px; border-radius: 20px; border: 2px solid rgba(99, 102, 241, 0.2);">
                        <b style="color: var(--p2-color); font-size: 1.2rem;">🫐 2P (오른쪽)</b><br><span style="color:var(--text-main); font-weight:800; font-size: 1.1rem; line-height: 2;">H, J, K, L</span>
                    </div>
                </div>
                <button class="start-btn" onclick="startGame()">오븐 가동 시작!</button>
            `;
            overlay.style.display = 'flex';
        }

        function startGame() {
            isPlaying = true;
            score = 0;
            timeLeft = 60;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('currentScore').innerText = score;
            nextRound();

            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timerText').innerText = timeLeft;
                if(timeLeft <= 0) endGame();
            }, 1000);
        }

        document.addEventListener('keydown', (e) => {
            if(!isPlaying) return;
            const key = e.key.toUpperCase();
            
            // 1P
            if(key === 'A') toggleBit(document.getElementById('btn-128'), 128);
            if(key === 'S') toggleBit(document.getElementById('btn-64'), 64);
            if(key === 'D') toggleBit(document.getElementById('btn-32'), 32);
            if(key === 'F') toggleBit(document.getElementById('btn-16'), 16);
            
            // 2P
            if(key === 'H') toggleBit(document.getElementById('btn-8'), 8);
            if(key === 'J') toggleBit(document.getElementById('btn-4'), 4);
            if(key === 'K') toggleBit(document.getElementById('btn-2'), 2);
            if(key === 'L') toggleBit(document.getElementById('btn-1'), 1);
        });

        function toggleBit(btn, val) {
            if(!isPlaying) return;
            if(btn.classList.contains('active')) {
                btn.classList.remove('active');
                btn.innerText = "0";
                currentSum -= val;
            } else {
                btn.classList.add('active');
                btn.innerText = "1";
                currentSum += val;
            }
            document.getElementById('sumText').innerText = currentSum;
            if(currentSum === target) success();
        }

        // 🌟 빵 터지는 시각 효과
        function popBread() {
            const breads = ['🍰', '🧁', '🥐', '🥖', '🥨', '🥞', '🧇', '🥯'];
            const popCount = Math.floor(Math.random() * 3) + 4; 
            
            for(let i=0; i<popCount; i++) {
                const bread = breads[Math.floor(Math.random() * breads.length)];
                const el = document.createElement('div');
                el.innerText = bread;
                el.className = 'floating-bread';
                
                const card = document.getElementById('gameCard');
                const rect = card.getBoundingClientRect();
                const startX = rect.left + (rect.width / 2) + (Math.random() * 150 - 75);
                const startY = rect.top + (rect.height / 2) - 50;

                el.style.left = `${startX}px`;
                el.style.top = `${startY}px`;
                
                document.body.appendChild(el);
                
                setTimeout(() => el.remove(), 1200);
            }
        }

        function success() {
            score++;
            document.getElementById('currentScore').innerText = score;
            document.getElementById('gameCard').classList.add('success-flash');
            
            popBread();

            setTimeout(() => {
                document.getElementById('gameCard').classList.remove('success-flash');
                nextRound();
            }, 400);
        }

        function nextRound() {
            // 난이도 밸런싱
            if (Math.random() > 0.3) {
                target = Math.floor(Math.random() * 128) + 1; // 1~128
            } else {
                target = Math.floor(Math.random() * 255) + 1; // 1~255
            }
            
            document.getElementById('targetText').innerText = target;
            currentSum = 0;
            document.getElementById('sumText').innerText = "0";
            document.querySelectorAll('.bit-btn').forEach(b => {
                b.classList.remove('active');
                b.innerText = "0";
            });
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerId);
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('bitBakeryCoopScoreBlue', highScore);
                document.getElementById('highScore').innerText = highScore;
            }
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay').innerHTML = `
                <div style="font-size: 5rem; margin-bottom: 10px;">🎊</div>
                <h1 style="color:var(--blue-main); margin: 0 0 10px 0; font-size:3rem;">영업 종료!</h1>
                <p style="font-weight:700; font-size:1.3rem; color: var(--text-sub); margin-bottom: 30px;">환상의 호흡으로 <b style="color:var(--apple-green); font-size:2.2rem; font-family:'JetBrains Mono'; padding: 0 8px;">${score}</b>개의 빵을 구웠어요!</p>
                <button class="start-btn" onclick="resetToStart()">다시 도전하기</button>
            `;
        }
    </script>
</body>
</html>
